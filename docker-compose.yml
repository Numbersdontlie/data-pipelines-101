version: "3.9"

# ============================================================
#  Data Engineering Playground — Full Stack
#  Services: PostgreSQL, pgAdmin, Airflow, SQLMesh, Superset
# ============================================================

x-airflow-common: &airflow-common
  build:
    context: ./docker/airflow
    dockerfile: Dockerfile
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://playground:playground@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: "81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs="
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__WEBSERVER__SECRET_KEY: "playground_secret"
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: 10
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    POSTGRES_USER: playground
    POSTGRES_PASSWORD: playground
    POSTGRES_DB: warehouse
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./pipelines:/opt/airflow/pipelines
    - ./scripts:/opt/airflow/scripts
    - ./data:/opt/airflow/data
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - playground

services:
  # ─── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pg_warehouse
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_MULTIPLE_DATABASES: airflow,superset
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./docker/postgres/create_multiple_dbs.sh:/docker-entrypoint-initdb.d/00_create_dbs.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playground -d warehouse"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - playground

  # ─── pgAdmin ───────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pg_admin
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/postgres/pgadmin_servers.json:/pgadmin4/servers.json
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - playground

  # ─── Airflow Init ──────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username admin \
          --password admin \
          --firstname Playground \
          --lastname Admin \
          --role Admin \
          --email admin@playground.dev
        echo "Airflow initialized ✅"
    restart: on-failure

  # ─── Airflow Webserver ─────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    restart: unless-stopped
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─── Airflow Scheduler ─────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    restart: unless-stopped
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─── SQLMesh ───────────────────────────────────────────────
  sqlmesh:
    image: python:3.11-slim
    container_name: sqlmesh
    restart: unless-stopped
    working_dir: /project
    env_file:
      - .env
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./dbt_project:/project
    command: >
      bash -c "pip install sqlmesh psycopg2-binary --quiet &&
               echo 'SQLMesh ready ✅' &&
               tail -f /dev/null"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - playground

  # ─── Apache Superset ───────────────────────────────────────
  superset:
    image: apache/superset:3.1.0
    container_name: superset
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      SUPERSET_LOAD_EXAMPLES: "no"
    volumes:
      - ./docker/superset/superset_config.py:/app/pythonpath/superset_config.py
      - superset_data:/app/superset_home
    ports:
      - "8088:8088"
    command: >
      bash -c "
        superset db upgrade &&
        superset fab create-admin --username admin --firstname Admin --lastname User --email admin@playground.dev --password admin &&
        superset init &&
        gunicorn --bind 0.0.0.0:8088 --workers 2 --timeout 120 'superset.app:create_app()'
      "
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - playground

volumes:
  postgres_data:
  pgadmin_data:
  airflow_logs:
  superset_data:

networks:
  playground:
    driver: bridge
